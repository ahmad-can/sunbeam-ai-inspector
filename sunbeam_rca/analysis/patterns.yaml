  source_types: [syslog, juju]
  severity: 7
  context_window_secs: 120

# ── Juju cross-model / SAAS ─────────────────────────────────────

- id: JUJU_SAAS_INTEGRATION_BLOCKED
  category: juju
  description: "SAAS cross-model integration is blocked or waiting"
  regex: "SAAS integration.*status: (blocked|waiting)|Cross-model offer.*status: (blocked|waiting)"
  source_types: [juju]
  severity: 7
  context_window_secs: 300

- id: JUJU_INTEGRATION_INCOMPLETE
