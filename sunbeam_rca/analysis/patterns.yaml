  context_window_secs: 120

- id: NEUTRON_AGENT_DOWN
  category: openstack
  description: "Neutron network agent is down or not responding"
  regex: "Agent .* is down|neutron-.*-agent.*dead|Neutron agent.*not alive"
  source_types: [kubernetes, pipeline, juju]
  severity: 8
  context_window_secs: 120

- id: MYSQL_CONNECTION_REFUSED
  category: openstack
