  severity: 8
  context_window_secs: 180

- id: K8S_NODE_NOT_READY
  category: kubernetes
  description: "Kubernetes node not ready"
  regex: "node.*NotReady|NodeNotReady|node is not ready"
  source_types: [kubernetes, syslog, juju]
  severity: 8
  context_window_secs: 180

