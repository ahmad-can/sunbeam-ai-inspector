  regex: "sunbeam.*cluster.*bootstrap.*fail|sunbeam.*prepare-node.*fail"
  source_types: [pipeline, juju, sunbeam]
  severity: 9
  context_window_secs: 180

- id: SUNBEAM_WAIT_TIMEOUT
  category: sunbeam
  description: "Sunbeam cluster join wait timed out"
  regex: "wait timed out after"
  source_types: [pipeline, juju, sunbeam]
  severity: 9
  context_window_secs: 180

# ── MicroCeph ───────────────────────────────────────────────────

- id: MICROCEPH_DB_UNINITIALIZED
  category: ceph
  description: "MicroCeph database not yet initialized — node cannot join Ceph cluster"
  regex: "failed listing disks: Database is not yet initialized"
  source_types: [juju, syslog]
  severity: 9
  context_window_secs: 180

- id: MICROCEPH_RADOS_ERROR
  category: ceph
  description: "MicroCeph RADOS client initialization failed"
  regex: "RADOS object not found|Error initializing cluster client"
  source_types: [juju, syslog]
  severity: 9
  context_window_secs: 180

# ── K8s control plane / etcd ─────────────────────────────────────

- id: ETCD_RESTART
  category: k8s_control_plane
  description: "etcd was restarted (e.g. during charm upgrade hook) — can cause control plane instability"
  regex: "[Rr]estarting services:.*etcd|restarted etcd"
  source_types: [juju, syslog]
  severity: 9
  context_window_secs: 300

- id: ETCD_NO_LEADER
  category: k8s_control_plane
  description: "etcd cluster has no elected leader — control plane cannot serve requests"
  regex: "etcdserver: no leader|rafthttp:.*unreachable|etcdserver: leader changed"
  source_types: [syslog]
  severity: 9
  context_window_secs: 300

- id: K8S_APISERVER_WATCH_ERROR
  category: k8s_control_plane
  description: "kube-apiserver watch channel error due to etcd instability"
  regex: "watch chan error|etcdserver: request timed out|etcdserver: mvcc: required revision has been compacted"
  source_types: [syslog]
  severity: 7
  context_window_secs: 120

- id: K8SD_FEATURE_ORDERING_ERROR
  category: k8s_control_plane
  description: "k8sd feature controller tried to configure a feature before its dependency was installed"
  regex: "cannot upgrade ck-network as it is not installed|Failed to apply feature configuration"
  source_types: [syslog]
  severity: 8
  context_window_secs: 120

- id: CONTAINERD_CNI_INIT_FAIL
  category: k8s_control_plane
  description: "containerd could not load CNI configuration — no network config present at startup"
  regex: "no network config found in /etc/cni|failed to load cni during init|cni config load failed"
  source_types: [syslog]
  severity: 7
  context_window_secs: 120

- id: KUBELET_NETWORK_PLUGIN_NOT_READY
  category: k8s_control_plane
  description: "kubelet reports NetworkPluginNotReady — CNI plugin not initialized"
  regex: "NetworkPluginNotReady|cni plugin not initialized|network is not ready.*NetworkReady=false"
  source_types: [syslog]
  severity: 7
  context_window_secs: 120

- id: CILIUM_POD_PENDING
  category: k8s_control_plane
  description: "Cilium DaemonSet pod is stuck in Pending state — CNI cannot become operational"
  regex: "cilium.*phase=Pending|Unready.*cilium|Pod/cilium.*Pending"
  source_types: [juju, syslog]
  severity: 7
  context_window_secs: 180

- id: METALLB_WEBHOOK_FAILURE
  category: k8s_control_plane
  description: "MetalLB deployment failed due to webhook or control plane connectivity issues"
  regex: "failed to deploy MetalLB|metallb.*webhook.*connection refused"
  source_types: [juju, syslog]
  severity: 6
  context_window_secs: 120

- id: K8S_CONTROL_PLANE_UNSTABLE
  category: k8s_control_plane
  description: "Kubernetes API server unreachable or refusing connections"
  regex: "dial tcp.*6443.*connection refused|apiserver.*connection refused|Unable to connect to the server"
  source_types: [syslog, juju, pipeline]
  severity: 8
  context_window_secs: 180

- id: SYSTEMD_NETWORKD_WAIT_TIMEOUT
  category: k8s_control_plane
  description: "systemd-networkd-wait-online timed out — host networking not ready at boot"
  regex: "Timeout occurred while waiting for network connectivity|systemd-networkd-wait-online.*timed out"
  source_types: [syslog]
  severity: 5
  context_window_secs: 120

# ── Observability / OpenTelemetry ────────────────────────────────

- id: OTEL_COLLECTOR_CONFIG_ERROR
  category: observability
  description: "OpenTelemetry collector failed to start due to configuration error"
  regex: "failed to get config.*cannot unmarshal|prometheus receiver.*failed to unmarshal|job_name is empty"
  source_types: [syslog]
  severity: 9
  context_window_secs: 120

- id: OTEL_COLLECTOR_CRASH_LOOP
  category: observability
  description: "OpenTelemetry collector service is crash-looping"
  regex: "snap\\.opentelemetry-collector.*Main process exited.*FAILURE|snap\\.opentelemetry-collector.*status=1"
  source_types: [syslog]
  severity: 9
  context_window_secs: 120

- id: GRAFANA_AGENT_ERROR
  category: observability
  description: "Grafana agent or cos-agent service error"
  regex: "grafana-agent.*error|cos-agent.*error|cos-agent.*failed"
  source_types: [syslog, juju]
  severity: 7
  context_window_secs: 120

- id: OTEL_METRICS_MISSING
  category: observability
  description: "OpenTelemetry metrics endpoint returned no data — collector not serving"
  regex: "otelcol_process_uptime.*metric not found|metrics.*not found on machine"
  source_types: [pipeline]
  severity: 9
  context_window_secs: 60

# ── Validation / Tempest tests ──────────────────────────────────

- id: TEMPEST_TEST_EXECUTION_ERROR
  category: validation
  description: "Tempest test execution failed inside the container"
  regex: "task error.*Task\\s+\\d+.*status\\s+'failed'|Error during test execution"
  source_types: [pipeline, sunbeam, kubernetes, juju]
  severity: 9
  context_window_secs: 120

- id: VALIDATION_SMOKE_FAILURE
  category: validation
  description: "Sunbeam validation smoke tests reported failures"
  regex: "Validation tests:\\s+failed\\s+[1-9]"
  source_types: [pipeline, sunbeam]
  severity: 8
  context_window_secs: 120

- id: PYTEST_ASSERTION_FAILURE
  category: validation
  description: "A pytest assertion failed during test execution"
  regex: "Assertion(?:Error)?:.*"
  source_types: [pipeline, sunbeam, kubernetes]
  severity: 9
  context_window_secs: 60

# ── Snap service crash-loop ─────────────────────────────────────

- id: SNAP_SERVICE_CRASH_LOOP
  category: snap
  description: "A snap service is crash-looping — systemd restarting it repeatedly"
  regex: "Main process exited.*code=exited.*status=[1-9].*FAILURE"
  source_types: [syslog]
  severity: 8
  context_window_secs: 120

