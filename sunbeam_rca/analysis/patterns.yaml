# ── Infrastructure thresholds (synthetic from meminfo/df) ───────

- id: MEMORY_LOW
  category: infrastructure
  description: "Available memory is below 10% of total — system under memory pressure"
  regex: "Low memory:.*available"
  source_types: [syslog]
  severity: 7
  context_window_secs: 300

- id: DISK_FULL_THRESHOLD
  category: infrastructure
  description: "Filesystem usage exceeds 95% — risk of ENOSPC"
  regex: "Disk nearly full:.*at \\d+% usage"
  source_types: [syslog]
  severity: 8
  context_window_secs: 300

- id: INODE_EXHAUSTION_THRESHOLD
  category: infrastructure
  description: "Filesystem inode usage exceeds 95%"
  regex: "Inode nearly exhausted:.*at \\d+% usage"
  source_types: [syslog]
  severity: 8
  context_window_secs: 300

# ── Real-world bug patterns ────────────────────────────────────

- id: TERRAFORM_REGISTRY_UNREACHABLE
  category: sunbeam
  description: "Terraform failed to reach the provider registry — network or proxy issue"
  regex: "Failed to query available provider packages|registry\\.terraform\\.io.*(connection refused|timeout)|Failed to install provider"
  source_types: [pipeline, sunbeam, juju]
  severity: 8
  context_window_secs: 120

- id: CHARM_CHANNEL_NOT_FOUND
  category: juju
  description: "Juju charm or bundle not found in the requested channel"
  regex: "charm or bundle not found|no revisions of charm.*found|channel.*not found"
  source_types: [juju, pipeline]
  severity: 8
  context_window_secs: 120

- id: SUNBEAM_WEBSOCKET_ERROR
  category: sunbeam
  description: "Sunbeam websocket connection closed unexpectedly"
  regex: "websocket: close 1006|websocket.*unexpected close|websocket.*abnormal closure"
  source_types: [sunbeam, juju, syslog]
  severity: 7
  context_window_secs: 120

- id: MICROCEPH_OSD_MKFS_FAIL
