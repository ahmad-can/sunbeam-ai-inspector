  description: "MicroCeph OSD creation failed during filesystem format"
  regex: "bluestore failed to load|mkfs fsck found fatal error|failed to create OSD"
  source_types: [juju, syslog]
  severity: 9
  context_window_secs: 180

- id: FD_EXHAUSTION
  category: infrastructure
  description: "Process ran out of file descriptors"
  regex: "Too many open files|EMFILE|socket: too many open files"
  source_types: [syslog, juju, kubernetes]
  severity: 8
  context_window_secs: 120

- id: K8S_INSPECT_FAILURE
  category: kubernetes
  description: "k8s inspect failed due to insufficient permissions or group membership"
  regex: "Insufficient permissions|snap_daemon group|k8s inspect.*failed"
  source_types: [syslog, pipeline]
  severity: 6
  context_window_secs: 120

- id: METALLB_TIMEOUT
  category: k8s_control_plane
  description: "MetalLB deployment timed out or is not ready"
  regex: "timed out waiting for MetalLB|MetalLB.*not ready|metallb.*timed out"
  source_types: [syslog, juju, pipeline]
  severity: 8
  context_window_secs: 180
