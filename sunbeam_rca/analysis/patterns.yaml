  context_window_secs: 300

- id: SUNBEAM_TERRAFORM_STATE_LOCK
  category: sunbeam
  description: "Terraform failed to acquire state lock — concurrent or stuck operation"
  regex: "Error acquiring the state lock|Error locking state|state lock|Lock Info"
  source_types: [sunbeam, pipeline]
  severity: 9
  context_window_secs: 300

- id: SUNBEAM_CLUSTERD_UNAVAILABLE
  category: sunbeam
  description: "Sunbeam clusterd service is unavailable — database not initialized"
  regex: "Clusterd service unavailable|Database is not yet initialized|ClusterServiceUnavailableException"
  source_types: [sunbeam]
  severity: 7
  context_window_secs: 120

- id: SUNBEAM_STEP_FAILED
  category: sunbeam
  description: "A sunbeam deployment step raised an error"
  regex: "Failed to get k8s nodes|step.*failed|sunbeam\\.steps\\.\\w+.*ERROR|AddK8SNodeStep.*error"
  source_types: [sunbeam]
  severity: 7
  context_window_secs: 120

- id: SUNBEAM_JUJU_ACCOUNT_NOT_FOUND
  category: sunbeam
  description: "Juju user account not found — node may not be part of sunbeam cluster"
  regex: "JujuAccountNotFound|Juju user account not found"
  source_types: [sunbeam]
  severity: 6
  context_window_secs: 120

