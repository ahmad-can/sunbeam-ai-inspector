  context_window_secs: 180

- id: JUJU_APP_BLOCKED
  category: juju
  description: "Juju application is in blocked state"
  regex: "Application.*status: blocked|\\] Application.*blocked"
  source_types: [juju]
  severity: 8
  context_window_secs: 180

- id: JUJU_APP_WAITING
  category: juju
  description: "Juju application stuck in waiting state"
  regex: "Application.*status: waiting|\\] Application.*waiting"
  source_types: [juju]
  severity: 6
  context_window_secs: 180

# ── OVN / OVS networking ────────────────────────────────────────

- id: OVN_CONNECTION_RESET
  category: network
  description: "OVN/OVS connection reset (typically SSL or OVSDB)"
  regex: "SSL_read.*Connection reset|Connection reset by peer"
