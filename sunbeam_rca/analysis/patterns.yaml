- id: K8S_DNS_RESOLUTION_FAIL
  category: network
  description: "Kubernetes service DNS resolution failed (svc.cluster.local)"
  regex: "cannot resolve.*svc\\.cluster\\.local|lookup.*svc\\.cluster\\.local.*(timeout|canceled|misbehaving)"
  source_types: [juju, syslog, cloud_init]
  severity: 8
  context_window_secs: 120

- id: CILIUM_CNI_MISSING
  category: network
  description: "Machine is missing cilium_host network interface — Kubernetes CNI not operational"
  regex: "missing cilium_host network interface"
  source_types: [juju]
  severity: 8
  context_window_secs: 300

# ── Security ────────────────────────────────────────────────────

- id: APPARMOR_DENIED
  category: security
  description: "AppArmor denied an operation"
  regex: "apparmor.*DENIED|avc.*denied"
  source_types: [syslog]
  severity: 5
  context_window_secs: 60

# ── Additional network / connectivity ───────────────────────────

- id: CURL_CONNECT_TIMEOUT
  category: network
  description: "curl failed to connect due to timeout"
  regex: "curl.*Failed to connect.*[Tt]imeout|curl.*Resolving timed out"
  source_types: [cloud_init, pipeline, syslog]
  severity: 7
  context_window_secs: 120

# ── Additional snap ─────────────────────────────────────────────

- id: SNAP_SERVICE_FAILED
