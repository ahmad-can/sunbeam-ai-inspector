  source_types: [syslog, juju]
  severity: 7
  context_window_secs: 180

- id: CEPH_OSD_DOWN
  category: ceph
  description: "Ceph OSD down or out"
  regex: "osd\\.[0-9]+ (is down|out)"
  source_types: [syslog]
  severity: 8
  context_window_secs: 180

# ── Snap ─────────────────────────────────────────────────────────

- id: SNAP_INSTALL_FAILED
  category: snap
