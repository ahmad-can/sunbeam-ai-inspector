# Sunbeam RCA failure pattern library.
# Each pattern has:
#   id            — unique identifier
#   category      — failure domain
#   description   — human-readable explanation
#   regex         — Python regex matched against the log message
#   source_types  — which LogEvent source_types to scan
#   severity      — 1 (low) to 10 (critical)
#   context_window_secs — seconds of context to capture around the match

# ── Pipeline errors ──────────────────────────────────────────────

- id: PIPELINE_ERROR_ANNOTATION
  category: pipeline
  description: "GitHub Actions ##[error] annotation"
  regex: "##\\[error\\]"
  source_types: [pipeline]
  severity: 9
  context_window_secs: 120

- id: PIPELINE_SUBPROCESS_ERROR
  category: pipeline
  description: "A subprocess exited with non-zero status"
  regex: "subprocess\\.CalledProcessError.*returned non-zero"
  source_types: [pipeline]
  severity: 9
  context_window_secs: 120

- id: PIPELINE_PYTHON_TRACEBACK
  category: pipeline
  description: "Python traceback detected in pipeline log"
  regex: "Traceback \\(most recent call last\\)"
  source_types: [pipeline]
  severity: 8
  context_window_secs: 60

- id: PIPELINE_COMMAND_FAILED
  category: pipeline
  description: "Command failed with explicit exit code"
  regex: "exit (code|status)\\s+[1-9]"
  source_types: [pipeline]
  severity: 7
  context_window_secs: 60

# ── Juju failures ────────────────────────────────────────────────

- id: JUJU_CHARM_DOWNLOAD_FAIL
  category: juju
  description: "Juju failed to download a charm from charmhub"
  regex: "failed to download charm \"ch:"
  source_types: [juju, pipeline]
  severity: 8
  context_window_secs: 120

- id: JUJU_HOOK_FAILED
  category: juju
  description: "Juju hook execution failed"
  regex: "hook failed:.*"
  source_types: [juju]
  severity: 8
  context_window_secs: 120

- id: JUJU_AGENT_LOST
  category: juju
  description: "Juju agent lost contact with controller"
  regex: "agent is not communicating|agent lost"
  source_types: [juju, syslog]
  severity: 7
  context_window_secs: 180

- id: JUJU_UNIT_ERROR
  category: juju
  description: "Juju unit entered error state"
  regex: "unit.*entered.*error|workload-status.*error|hook \".*\" failed.*exit status"
  source_types: [juju]
  severity: 7
  context_window_secs: 120

- id: JUJU_WORKER_UNEXPECTED_ERROR
  category: juju
  description: "Juju manifold worker returned unexpected error"
  regex: "manifold worker returned unexpected error"
  source_types: [juju]
  severity: 8
  context_window_secs: 120

# ── Kernel / OOM ─────────────────────────────────────────────────

- id: OOM_KILL
  category: kernel
  description: "Kernel OOM killer invoked"
  regex: "Out of memory|oom-killer|oom_reaper|invoked oom-killer"
  source_types: [syslog, dmesg]
  severity: 10
  context_window_secs: 300

- id: KERNEL_PANIC
  category: kernel
  description: "Kernel panic detected"
  regex: "Kernel panic|kernel BUG"
  source_types: [syslog, dmesg]
  severity: 10
  context_window_secs: 300

# ── Disk / filesystem ────────────────────────────────────────────

- id: DISK_FULL
  category: disk
  description: "No space left on device"
  regex: "No space left on device|ENOSPC"
  source_types: [syslog, pipeline, juju]
  severity: 9
  context_window_secs: 120

- id: INODE_EXHAUSTION
  category: disk
  description: "Inode table exhaustion"
  regex: "no free inodes|inode.*full"
  source_types: [syslog]
  severity: 9
  context_window_secs: 120

# ── Network ──────────────────────────────────────────────────────

- id: NETWORK_CONNECTION_REFUSED
  category: network
  description: "Connection refused"
  regex: "[Cc]onnection refused"
  source_types: [syslog, pipeline, juju]
  severity: 6
  context_window_secs: 60

- id: NETWORK_TIMEOUT
  category: network
  description: "Network timeout or unreachable host"
  regex: "connection timed out|timed out after \\d|i/o timeout|[Nn]etwork is unreachable"
  source_types: [syslog, pipeline, juju, cloud_init]
  severity: 6
  context_window_secs: 60

- id: DNS_FAILURE
  category: network
  description: "DNS resolution failure"
  regex: "Name or service not known|Temporary failure in name resolution|NXDOMAIN"
  source_types: [syslog, pipeline, juju, cloud_init]
  severity: 7
  context_window_secs: 60

# ── Container / Image ────────────────────────────────────────────

- id: IMAGE_PULL_FAILURE
  category: container
  description: "Container image pull failed"
  regex: "ImagePullBackOff|ErrImagePull|failed to pull|pull access denied"
  source_types: [syslog, pipeline, juju]
  severity: 8
  context_window_secs: 120

# ── LXD ──────────────────────────────────────────────────────────

- id: LXD_START_FAILED
  category: lxd
  description: "LXD container failed to start"
  regex: "lxc start failed|Failed to run.*lxd|LXD socket not found"
  source_types: [syslog, juju, pipeline]
  severity: 8
  context_window_secs: 120

# ── Ceph ─────────────────────────────────────────────────────────

- id: CEPH_HEALTH_ERR
