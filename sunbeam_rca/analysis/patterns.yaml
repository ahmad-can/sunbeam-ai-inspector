  severity: 6
  context_window_secs: 120

- id: OVN_OVSDB_CONNECTION_FAILED
  category: network
  description: "Unable to connect to OVSDB (OVN southbound/northbound)"
  regex: "Unable to open stream to.*6642|Unable to open stream to.*6641|failed to connect to ovsdb"
  source_types: [syslog]
  severity: 7
  context_window_secs: 120

- id: OPENSTACK_HYPERVISOR_ERROR
  category: openstack
  description: "OpenStack hypervisor service error"
  regex: "openstack-hypervisor.*error|openstack-hypervisor.*failed|nova-compute.*error"
  source_types: [syslog, juju]
  severity: 7
  context_window_secs: 120

# ── Kubernetes ──────────────────────────────────────────────────

- id: K8S_POD_CRASH_LOOP
  category: kubernetes
  description: "Kubernetes pod in CrashLoopBackOff state"
  regex: "CrashLoopBackOff|back-off.*restarting failed container"
